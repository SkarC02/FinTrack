name: sic_app
description: Sistema de Contabilidad Iglesia - SIC App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0

  # ── Navegación ───────────────────────────
  go_router: ^14.2.0

  # ── Estado (Riverpod) ────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Gráficas ─────────────────────────────
  fl_chart: ^0.68.0

  # ── PDF y Exportación ────────────────────
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^10.0.0

  # ── Utilidades ───────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
